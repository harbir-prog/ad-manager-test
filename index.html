<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Gap - GAM Lab</title>
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>

    <script async src="https://securepubads.g.doubleclick.net/tag/js/gpt.js" crossorigin="anonymous"></script>
    <script>
      window.googletag = window.googletag || {cmd: []};
      googletag.cmd.push(function() {
        googletag.defineSlot('/6075/github_test_banner', [300, 250], 'div-gpt-ad-1776851474373-0').addService(googletag.pubads());
        googletag.pubads().enableSingleRequest();
        googletag.enableServices();
      });
    </script>

    <style>
        body {
            margin: 0; padding: 0; background-color: #333;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; font-family: 'Arial', sans-serif; color: white;
        }
        #game-container {
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
        }
        .ad-container {
            margin: 20px 0;
            background: #444;
            padding: 10px;
            border: 1px dashed #777;
            text-align: center;
            min-width: 300px;
            min-height: 250px;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <div class="ad-container">
        <p style="font-size: 10px; color: #888; margin-top: 0;">ADVERTISEMENT</p>
        <div id='div-gpt-ad-1776851474373-0' style='min-width: 300px; min-height: 250px;'>
          <script>
            googletag.cmd.push(function() { googletag.display('div-gpt-ad-1776851474373-0'); });
          </script>
        </div>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 400,
            height: 600,
            parent: 'game-container',
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 1200 }, debug: false }
            },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player, pipes, score = 0, gameState = 'BOOT'; 
        let currentProblem = { q: '', a: 0, d: 0, correctGap: '' };
        let pipeSpeed = -200, spawnTimer, scoreText, questionText, menuText;

        function preload() {
            let birdGraphics = this.make.graphics({ x: 0, y: 0, add: false });
            birdGraphics.fillStyle(0xFFFF00, 1);
            birdGraphics.fillCircle(15, 15, 15);
            birdGraphics.lineStyle(2, 0x000000, 1);
            birdGraphics.strokeCircle(15, 15, 15);
            birdGraphics.generateTexture('bird', 30, 30);

            let pipeGraphics = this.make.graphics({ x: 0, y: 0, add: false });
            pipeGraphics.fillStyle(0x2ecc71, 1);
            pipeGraphics.fillRect(0, 0, 60, 600);
            pipeGraphics.lineStyle(4, 0x27ae60, 1);
            pipeGraphics.strokeRect(2, 0, 56, 600);
            pipeGraphics.generateTexture('pipe', 60, 600);
        }

        function create() {
            this.cameras.main.setBackgroundColor('#70c5ce');
            pipes = this.physics.add.group();
            
            player = this.physics.add.sprite(100, 300, 'bird');
            player.setCircle(15);
            player.body.allowGravity = false;
            player.visible = false;
            player.setDepth(10);

            questionText = this.add.text(200, 50, '', { fontSize: '32px', fill: '#fff', stroke: '#000', strokeThickness: 5 }).setOrigin(0.5).setDepth(20);
            scoreText = this.add.text(200, 100, 'Score: 0', { fontSize: '20px', fill: '#fff' }).setOrigin(0.5).setDepth(20);
            menuText = this.add.text(200, 300, 'MATH GAP\n\nTap to Start', { fontSize: '24px', fill: '#fff', align: 'center', stroke: '#000', strokeThickness: 4 }).setOrigin(0.5).setDepth(20);

            this.input.on('pointerdown', () => handleInput(this));
            
            // Collide ONLY with solid pipes (Green)
            this.physics.add.collider(player, pipes, (p, pipe) => {
                if (!pipe.isSensor) gameOver.call(this);
            });

            gameState = 'MENU';
        }

        function update() {
            if (gameState === 'PLAYING') {
                player.angle = Phaser.Math.Clamp(player.body.velocity.y * 0.1, -20, 90);
                
                if (player.y > 600 || player.y < 0) gameOver.call(this);
                
                pipes.children.iterate(child => {
                    if (!child) return;

                    // COORDINATE CHECK (No Physics Friction)
                    // If player passes the X line of a sensor...
                    if (child.isSensor && !child.passed && player.x > child.x) {
                        child.passed = true;
                        
                        // Check if player is vertically within THIS specific gap zone
                        if (Math.abs(player.y - child.y) < 100) { 
                            if (child.val === child.correctVal) {
                                score++;
                                scoreText.setText('Score: ' + score);
                                generateMathProblem(); 
                            } else {
                                gameOver.call(this);
                            }
                        }
                    }

                    if (child.x < -100) child.destroy();
                });
            }
        }

        function handleInput(scene) {
            if (gameState === 'MENU') startGame(scene);
            else if (gameState === 'PLAYING') player.setVelocityY(-350);
            else if (gameState === 'GAMEOVER') scene.scene.restart();
        }

        function startGame(scene) {
            gameState = 'PLAYING';
            menuText.visible = false;
            player.visible = true;
            player.body.allowGravity = true;
            player.setPosition(100, 300);
            player.setVelocity(0, 0);
            score = 0;
            scoreText.setText('Score: 0');
            
            generateMathProblem();
            spawnPipes(scene);
            
            spawnTimer = scene.time.addEvent({ 
                delay: 2500, 
                callback: () => spawnPipes(scene), 
                loop: true 
            });
        }

        function generateMathProblem() {
            let a = Phaser.Math.Between(1, 10);
            let b = Phaser.Math.Between(1, 10);
            currentProblem.q = `${a} + ${b} = ?`;
            currentProblem.a = a + b;
            currentProblem.d = currentProblem.a + Phaser.Math.RND.pick([-1, 1, 2]);
            if (currentProblem.d === currentProblem.a) currentProblem.d++;
            currentProblem.correctGap = Math.random() > 0.5 ? 'top' : 'bottom';
            questionText.setText(currentProblem.q);
        }

        function spawnPipes(scene) {
            if (gameState !== 'PLAYING') return;
            const gapSize = 180; // Slightly larger for better movement
            const x = 450;
            const midY = Phaser.Math.Between(200, 400);
            
            // Solid Green Pillars
            let pTop = pipes.create(x, midY - gapSize - 300, 'pipe');
            let pMid = pipes.create(x, midY, 'pipe'); pMid.setDisplaySize(60, 60); 
            let pBot = pipes.create(x, midY + gapSize + 300, 'pipe');

            [pTop, pMid, pBot].forEach(p => { 
                p.body.allowGravity = false; 
                p.body.immovable = true; 
                p.setVelocityX(pipeSpeed); 
                p.isSensor = false;
            });

            let topVal = currentProblem.correctGap === 'top' ? currentProblem.a : currentProblem.d;
            let botVal = currentProblem.correctGap === 'bottom' ? currentProblem.a : currentProblem.d;

            // Labels
            let tTop = scene.add.text(x, midY - (gapSize/2), topVal, { fontSize: '32px', fill: '#000', fontWeight: 'bold' }).setOrigin(0.5).setDepth(15);
            let tBot = scene.add.text(x, midY + (gapSize/2), botVal, { fontSize: '32px', fill: '#000', fontWeight: 'bold' }).setOrigin(0.5).setDepth(15);

            // Invisible Sensors (Data storage only, no collision)
            let sTop = pipes.create(x, midY - (gapSize/2), null);
            sTop.setVisible(false);
            sTop.body.setEnable(false); // Disable physics entirely for this object
            sTop.isSensor = true;
            sTop.val = topVal;
            sTop.correctVal = currentProblem.a;
            sTop.passed = false;

            let sBot = pipes.create(x, midY + (gapSize/2), null);
            sBot.setVisible(false);
            sBot.body.setEnable(false); // Disable physics entirely for this object
            sBot.isSensor = true;
            sBot.val = botVal;
            sBot.correctVal = currentProblem.a;
            sBot.passed = false;

            scene.events.on('update', () => {
                if (tTop.active) {
                    tTop.x = pTop.x;
                    tBot.x = pTop.x;
                    sTop.x = pTop.x; // Keep sensor data synced with pipe position
                    sBot.x = pTop.x;
                }
            });
        }

        function gameOver() {
            if (gameState === 'GAMEOVER') return;
            gameState = 'GAMEOVER';
            if (spawnTimer) spawnTimer.remove();
            this.physics.pause();
            player.setTint(0xff0000);
            questionText.setText("WRONG!");
            menuText.setText(`GAME OVER\nFinal Score: ${score}\nTap to Restart`);
            menuText.visible = true;

            if(googletag && googletag.pubads) {
                googletag.pubads().refresh();
            }
        }
    </script>
</body>
</html>
